<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">codemap-ai logo</title>
  <desc id="desc">A dark rounded-square icon combining code brackets, a map grid, and connected graph nodes.</desc>
  <defs>
    <linearGradient id="codemap-bg" x1="18" y1="10" x2="142" y2="154" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0E1B3D"/>
      <stop offset="1" stop-color="#120A2D"/>
    </linearGradient>
    <radialGradient id="codemap-orbit" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(111 45) rotate(125) scale(96 88)">
      <stop stop-color="#6EE7F9" stop-opacity="0.42"/>
      <stop offset="0.58" stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0B1024" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="codemap-line" x1="34" y1="32" x2="124" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF"/>
      <stop offset="0.48" stop-color="#B9F4FF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="codemap-accent" x1="39" y1="120" x2="126" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="codemap-glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.39 0 0 0 0 0.74 0 0 0 0 1 0 0 0 0.6 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="160" height="160" rx="32" fill="url(#codemap-bg)"/>
  <rect width="160" height="160" rx="32" fill="url(#codemap-orbit)"/>
  <path d="M32 33H58M32 33V59M128 33H102M128 33V59M32 127H58M32 127V101M128 127H102M128 127V101" stroke="#DDE7FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>

  <path d="M45 78C53 57 66 44 80 39C94 44 107 57 115 78C107 99 94 116 80 121C66 116 53 99 45 78Z" stroke="#34456F" stroke-width="2.4" opacity="0.72"/>
  <path d="M58 80C64 66 72 57 80 53C88 57 96 66 102 80C96 94 88 103 80 107C72 103 64 94 58 80Z" stroke="#425780" stroke-width="2" opacity="0.78"/>
  <path d="M80 39V121M45 78H115M56 53C67 60 93 60 104 53M56 107C67 100 93 100 104 107" stroke="#2B365E" stroke-width="1.7" opacity="0.84"/>

  <path d="M50 104L80 36L110 104M61 80H99" stroke="url(#codemap-line)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#codemap-glow)"/>
  <path d="M52 104H36V86M108 104H124V86" stroke="url(#codemap-accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M61 80L80 36L99 80M61 80L52 104M99 80L108 104" stroke="#EAF7FF" stroke-width="1.7" stroke-linecap="round" opacity="0.72"/>

  <circle cx="80" cy="36" r="6.5" fill="#F8FAFF" filter="url(#codemap-glow)"/>
  <circle cx="61" cy="80" r="5.5" fill="#22D3EE"/>
  <circle cx="99" cy="80" r="5.5" fill="#A78BFA"/>
  <circle cx="52" cy="104" r="5" fill="#F8FAFF"/>
  <circle cx="108" cy="104" r="5" fill="#F8FAFF"/>
</svg>
